<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TERRAMOTUS SPECULATOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --void:   #03050C;
            --s1:     #070C18;
            --s2:     #0A1220;
            --s3:     #0E192C;
            --b1:     #121F35;
            --b2:     #1A2B45;
            --tx:     #C8D4E4;
            --tx2:    #3E5270;
            --tx3:    #1E3050;
            --teal:   #00C8B4;
            --amber:  #E09820;
            --red:    #E03050;
            --font:   'Space Grotesk', system-ui, sans-serif;
            --mono:   'JetBrains Mono', monospace;
        }

        html, body { height: 100%; }

        body {
            font-family: var(--font);
            background: var(--void);
            color: var(--tx);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,180,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,180,0.018) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 40% at 10% 65%, rgba(0,200,180,0.028) 0%, transparent 100%),
                radial-gradient(ellipse 35% 35% at 90% 15%, rgba(224,152,32,0.018) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            background: rgba(3,5,12,0.94);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--b1);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 28px 11px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand { display: flex; align-items: center; gap: 13px; }

        .brand-icon { color: var(--teal); flex-shrink: 0; }

        .brand-text { display: flex; flex-direction: column; gap: 3px; }

        .brand-name {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            line-height: 1;
        }

        .live-pill {
            font-family: var(--mono);
            font-size: 0.56rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--teal);
            background: rgba(0,200,180,0.09);
            border: 1px solid rgba(0,200,180,0.28);
            padding: 2px 7px;
            border-radius: 2px;
        }

        .brand-sub {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--tx2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 9px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--tx2);
            background: rgba(7,12,24,0.8);
            border: 1px solid var(--b1);
            padding: 5px 13px;
            border-radius: 40px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 0 2px rgba(0,200,180,0.2);
            flex-shrink: 0;
            animation: blink 2s ease-in-out infinite;
        }

        .dot.err {
            background: var(--red);
            box-shadow: 0 0 0 2px rgba(224,48,80,0.2);
            animation: none;
        }

        @keyframes blink {
            0%,100% { opacity:1; }
            50%      { opacity:0.2; }
        }

        .status-sep { color: var(--b2); }

        #seismograph { display:block; width:100%; height:68px; }

        .feed {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 14px 28px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--b2) transparent;
        }

        .feed::-webkit-scrollbar       { width: 3px; }
        .feed::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 60px 0;
        }

        .empty-icon  { font-size: 1.8rem; color: var(--tx3); line-height:1; }
        .empty-label { font-family: var(--mono); font-size: 0.74rem; color: var(--tx3); letter-spacing: 0.07em; text-transform: uppercase; }
        .empty-sub   { font-size: 0.7rem; color: var(--tx3); opacity: 0.55; }

        .card {
            position: relative;
            background: var(--s1);
            border: 1px solid var(--b1);
            border-left: 3px solid var(--c, var(--teal));
            border-radius: 7px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            overflow: hidden;
            cursor: default;
            transition: background 0.15s;
            animation: cardIn 0.2s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--cb, rgba(0,200,180,0.045)) 0%, transparent 32%);
            pointer-events: none;
        }

        .card:hover { background: var(--s2); }

        .card.hi {
            border-color: var(--b1);
            border-left-color: var(--red);
            box-shadow: 0 0 0 1px rgba(224,48,80,0.08), 0 3px 24px rgba(224,48,80,0.05);
        }

        .card.hi .mag { animation: magpulse 2.5s ease-in-out infinite; }

        @keyframes cardIn {
            from { opacity:0; transform: translateY(-6px); }
            to   { opacity:1; transform: translateY(0); }
        }

        @keyframes magpulse {
            0%,100% { opacity:1; }
            50%      { opacity:0.65; }
        }

        .mag {
            font-size: 2.05rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--c, var(--teal));
            min-width: 64px;
            flex-shrink: 0;
        }

        .mag-m {
            font-size: 0.65rem;
            font-weight: 500;
            font-family: var(--mono);
            color: var(--tx2);
            margin-left: 2px;
            vertical-align: super;
        }

        .info    { flex:1; min-width:0; }

        .region {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--tx);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
            font-family: var(--mono);
            font-size: 0.66rem;
            color: var(--tx2);
        }

        .meta-sep { color: var(--b2); }

        .coord-link {
            color: inherit;
            text-decoration: none;
            transition: color 0.14s;
        }
        .coord-link:hover { color: var(--teal); }

        .ev-id {
            font-family: var(--mono);
            font-size: 0.57rem;
            color: var(--tx3);
            margin-top: 5px;
        }

        .right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .ev-time {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--tx2);
            white-space: nowrap;
        }

        .ev-depth {
            font-family: var(--mono);
            font-size: 0.63rem;
            color: var(--tx3);
        }

        .footer {
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            border-top: 1px solid var(--b1);
            padding: 8px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--tx3);
            background: rgba(3,5,12,0.75);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .footer-left { display:flex; align-items:center; gap:10px; }
        .footer-sep  { color: var(--b2); }

        .clear-btn {
            appearance: none;
            background: none;
            border: 1px solid var(--b2);
            color: var(--tx2);
            font-family: var(--mono);
            font-size: 0.63rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color 0.14s, color 0.14s;
        }

        .clear-btn:hover { border-color: var(--tx2); color: var(--tx); }

        @media (max-width:580px) {
            .header-top { padding:12px 16px 9px; }
            .feed       { padding:12px 16px; }
            .footer     { padding:7px 16px; }
            .mag        { font-size:1.55rem; min-width:50px; }
            .card       { gap:10px; }
            .right      { flex-direction:row; align-items:center; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card, .dot, .card.hi .mag { animation:none; }
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="shell">

    <header class="header">
        <div class="header-top">
            <div class="brand">
                <svg class="brand-icon" width="30" height="22" viewBox="0 0 30 22" fill="none">
                    <polyline points="0,11 4,11 7,2 10,20 12,11 14.5,6.5 17,15.5 19,11 25,11 30,11"
                              stroke="currentColor" stroke-width="1.75"
                              stroke-linejoin="round" stroke-linecap="round"/>
                </svg>
                <div class="brand-text">
                    <div class="brand-name">
                        Terramotus Speculator
                        <span class="live-pill">Live</span>
                    </div>
                    <div class="brand-sub">Global Seismic Monitor</div>
                </div>
            </div>
            <div class="status">
                <span class="dot" id="dot"></span>
                <span id="statusText">Connecting</span>
                <span class="status-sep">·</span>
                <span id="count">0 events</span>
            </div>
        </div>
        <canvas id="seismograph"></canvas>
    </header>

    <main class="feed" id="feed">
        <div class="empty">
            <div class="empty-icon">⟡</div>
            <div class="empty-label">Awaiting seismic activity</div>
            <div class="empty-sub">Events appear here in real time</div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-left">
            <span>Seismic Portal · SSE</span>
            <span class="footer-sep">·</span>
            <button class="clear-btn" onclick="clearFeed()">Clear</button>
        </div>
        <span id="lastEvent"></span>
    </footer>

</div>
<script>
    (function () {
        'use strict';

        const SSE_URL       = '/api/v1/earthquakes/subscribe';
        const MAX_EVENTS    = 150;
        const MAX_RECONNECT = 12;

        const feedEl        = document.getElementById('feed');
        const dotEl         = document.getElementById('dot');
        const statusTextEl  = document.getElementById('statusText');
        const countEl       = document.getElementById('count');
        const lastEventEl   = document.getElementById('lastEvent');
        const canvas        = document.getElementById('seismograph');
        const ctx           = canvas.getContext('2d');

        let eventCount        = 0;
        let reconnectAttempts = 0;
        let reconnectTimer    = null;
        let es                = null;
        let pts               = [];
        let spikeE            = 0;
        let spikeF            = 0;
        let waveColor         = '#00C8B4';
        let lastDraw          = 0;

        function initCanvas() {
            const W = canvas.offsetWidth;
            const H = canvas.offsetHeight;
            canvas.width  = W;
            canvas.height = H;
            if (pts.length !== W) pts = new Array(W).fill(H / 2);
        }

        function triggerSpike(mag) {
            spikeE     = Math.min(mag * 5, 25);
            spikeF     = 28;
            waveColor  = mag >= 6 ? '#E03050' : mag >= 4 ? '#E09820' : '#00C8B4';
        }

        function drawFrame(ts) {
            requestAnimationFrame(drawFrame);
            if (ts - lastDraw < 34) return;
            lastDraw = ts;

            const W   = canvas.width;
            const H   = canvas.height;
            if (!W || !H) return;
            const mid = H / 2;

            pts.shift();
            const noise = (Math.random() - 0.5) * 2.2;
            let sp = 0;
            if (spikeF > 0) {
                sp = spikeE * Math.sin(spikeF * 0.52) * (spikeF / 28);
                spikeF--;
            }
            pts.push(mid + noise + sp);

            ctx.clearRect(0, 0, W, H);

            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth   = 1;
            for (let y = 0; y < H; y += 22) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            const g = ctx.createLinearGradient(0, 0, W, 0);
            g.addColorStop(0,    waveColor + '00');
            g.addColorStop(0.4,  waveColor + '33');
            g.addColorStop(1,    waveColor + 'CC');

            ctx.beginPath();
            ctx.strokeStyle = g;
            ctx.lineWidth   = 1.5;
            ctx.lineJoin    = 'round';
            ctx.shadowColor = waveColor;
            ctx.shadowBlur  = 7;

            for (let i = 0; i < pts.length; i++) {
                i === 0 ? ctx.moveTo(i, pts[i]) : ctx.lineTo(i, pts[i]);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            const cy = pts[pts.length - 1];
            ctx.beginPath();
            ctx.fillStyle   = waveColor;
            ctx.shadowColor = waveColor;
            ctx.shadowBlur  = 14;
            ctx.arc(W - 1, cy, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur  = 0;
        }

        function magColors(m) {
            if (m == null) return { c: '#00C8B4', cb: 'rgba(0,200,180,0.045)'  };
            if (m >= 6)    return { c: '#E03050', cb: 'rgba(224,48,80,0.05)'   };
            if (m >= 4)    return { c: '#E09820', cb: 'rgba(224,152,32,0.05)'  };
                           return { c: '#00C8B4', cb: 'rgba(0,200,180,0.045)'  };
        }

        function relTime(iso) {
            try {
                const d = Math.floor((Date.now() - new Date(iso)) / 1000);
                if (d < 60)    return d + 's ago';
                if (d < 3600)  return Math.floor(d / 60) + 'm ago';
                if (d < 86400) return Math.floor(d / 3600) + 'h ago';
                return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            } catch { return ''; }
        }

        function absTime(iso) {
            try {
                return new Date(iso).toLocaleString(undefined, {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
            } catch { return iso || ''; }
        }

        function mk(tag, cls) {
            const e = document.createElement(tag);
            if (cls) e.className = cls;
            return e;
        }

        function tx(node, t) { node.textContent = t; return node; }

        function buildCard(ev) {
            const m        = ev.magnitude;
            const { c, cb } = magColors(m);
            const iso      = ev.time || ev.lastUpdate || new Date().toISOString();
            const region   = ev.flynnRegion || ev.place || 'Unknown region';
            const lat      = ev.latitude  != null ? Number(ev.latitude).toFixed(2)  : null;
            const lon      = ev.longitude != null ? Number(ev.longitude).toFixed(2) : null;
            const depth    = ev.depth != null ? ev.depth + ' km' : null;

            const card = mk('div', 'card' + (m >= 6 ? ' hi' : ''));
            card.style.setProperty('--c',  c);
            card.style.setProperty('--cb', cb);

            const magEl = mk('div', 'mag');
            magEl.innerHTML = (m != null ? m.toFixed(1) : '?') + '<span class="mag-m">M</span>';
            card.appendChild(magEl);

            const info = mk('div', 'info');

            info.appendChild(tx(mk('div', 'region'), region));

            const meta = mk('div', 'meta');
            if (lat && lon) {
                const a    = mk('a', 'coord-link');
                a.href     = 'https://www.openstreetmap.org/?mlat=' + lat + '&mlon=' + lon + '&zoom=9';
                a.target   = '_blank';
                a.rel      = 'noopener noreferrer';
                a.textContent = lat + '\u00b0, ' + lon + '\u00b0';
                meta.appendChild(a);
            }
            if (depth) {
                if (lat && lon) meta.appendChild(tx(mk('span', 'meta-sep'), '\u00b7'));
                meta.appendChild(tx(mk('span'), '\u2193 ' + depth));
            }
            info.appendChild(meta);

            if (ev.id) info.appendChild(tx(mk('div', 'ev-id'), ev.id));

            card.appendChild(info);

            const right  = mk('div', 'right');
            const timeEl = tx(mk('div', 'ev-time'), relTime(iso));
            timeEl.title       = absTime(iso);
            timeEl.dataset.iso = iso;
            right.appendChild(timeEl);

            card.appendChild(right);

            return card;
        }

        function addEvent(data) {
            const empty = feedEl.querySelector('.empty');
            if (empty) empty.remove();

            feedEl.prepend(buildCard(data));

            if (data.magnitude != null) triggerSpike(data.magnitude);

            while (feedEl.children.length > MAX_EVENTS) feedEl.removeChild(feedEl.lastChild);

            eventCount++;
            countEl.textContent = eventCount + ' events';

            if (data.time) {
                lastEventEl.textContent  = 'Last \u00b7 ' + relTime(data.time);
                lastEventEl.dataset.iso  = data.time;
            }
        }

        window.clearFeed = function () {
            feedEl.innerHTML = '<div class="empty"><div class="empty-icon">\u25ef</div><div class="empty-label">Cleared \u2014 awaiting activity</div></div>';
            eventCount = 0;
            countEl.textContent     = '0 events';
            lastEventEl.textContent = '';
            delete lastEventEl.dataset.iso;
        };

        function refreshTimes() {
            feedEl.querySelectorAll('.ev-time[data-iso]').forEach(function (el) {
                el.textContent = relTime(el.dataset.iso);
            });
            if (lastEventEl.dataset.iso) {
                lastEventEl.textContent = 'Last \u00b7 ' + relTime(lastEventEl.dataset.iso);
            }
        }

        setInterval(refreshTimes, 30000);

        function setStatus(ok, msg) {
            dotEl.className          = 'dot' + (ok ? '' : ' err');
            statusTextEl.textContent = msg || (ok ? 'Connected' : 'Disconnected');
        }

        function connectSSE() {
            if (es) { es.close(); es = null; }
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

            try { es = new EventSource(SSE_URL); } catch (e) {
                setStatus(false, 'Error');
                scheduleReconnect();
                return;
            }

            es.onopen = function () {
                setStatus(true, 'Connected');
                reconnectAttempts = 0;
            };

            es.onmessage = function (e) {
                if (!e.data || e.data === 'ping') return;
                try { addEvent(JSON.parse(e.data)); } catch (_) {}
            };

            es.onerror = function () {
                setStatus(false, 'Reconnecting\u2026');
                scheduleReconnect();
            };

            window.addEventListener('beforeunload', function () {
                if (es) es.close();
            }, { once: true });
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectAttempts++;
            if (reconnectAttempts > MAX_RECONNECT) {
                setStatus(false, 'Connection lost \u2014 reload');
                return;
            }
            const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), 30000);
            reconnectTimer = setTimeout(function () {
                reconnectTimer = null;
                if (document.visibilityState === 'visible') {
                    connectSSE();
                } else {
                    document.addEventListener('visibilitychange', function h() {
                        if (document.visibilityState === 'visible') {
                            document.removeEventListener('visibilitychange', h);
                            connectSSE();
                        }
                    });
                }
            }, delay);
        }

        document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' && (!es || es.readyState === EventSource.CLOSED)) {
                connectSSE();
            }
        });

        window.addEventListener('load', function () {
            initCanvas();
            requestAnimationFrame(drawFrame);
        });

        window.addEventListener('resize', initCanvas);

        connectSSE();
    })();
</script>
</body>
</html>
