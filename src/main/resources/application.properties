application.client.seismic-portal.domain=www.seismicportal.eu
application.web-socket.seismic-portal.retry-delay=5000
application.web-socket.seismic-portal.backfill-hours=24

quarkus.rest.path=/api
quarkus.rest-client.seismic-portal-api.url=https://${application.client.seismic-portal.domain}
quarkus.rest-client.connect-timeout=5000
quarkus.rest-client.timeout=30000
quarkus.hibernate-orm.jdbc.statement-batch-size=50
quarkus.websockets-next.client.auto-ping-interval=PT30S